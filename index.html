<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gradasiAwal: '#FF9A5C',
                        gradasiAkhir: '#FF6B95',
                        tombolMerah: '#F53F3F',
                        tombolNetral: '#F2F3F5',
                        latar: '#F0F4FD',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tombol {
                @apply w-full h-14 rounded-lg text-lg font-medium shadow-sm transition-all duration-150 active:scale-95 flex items-center justify-center;
            }
            .gradasi-warna {
                background: linear-gradient(135deg, #FF9A5C 0%, #FF6B95 100%);
            }
        }
    </style>
</head>
<body class="bg-latar min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300 dark:bg-gray-900">

    <!-- BAGIAN JUDUL DAN IDENTITAS -->
    <div class="text-center mb-6 w-full max-w-xs">
        <h1 class="text-[clamp(1.3rem,3vw,1.8rem)] font-bold text-gray-800 dark:text-white mb-1">Kalkulator Sederhana</h1>
        <p class="text-gray-700 dark:text-gray-300">Nama : Muji Marta Qodri</p>
        <p class="text-gray-700 dark:text-gray-300">NIM : 231011450177</p>
    </div>

    <!-- KOTAK UTAMA KALKULATOR -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-xs overflow-hidden">
        <!-- BAGIAN LAYAR TAMPILAN -->
        <div class="gradasi-warna p-5 text-white relative">
            <div class="flex justify-between items-start mb-8">
                <span class="text-sm font-medium">Kalkulator</span>
                <button id="tombolTema" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors">
                    <i class="fa fa-moon-o"></i>
                </button>
            </div>
            <div class="text-right">
                <p id="layarAtas" class="text-sm text-white/70 h-5"></p>
                <input type="text" id="layarUtama" readonly value="0" 
                    class="w-full text-right text-4xl font-bold bg-transparent border-none outline-none text-white">
            </div>
        </div>

        <!-- BAGIAN TOMBOL -->
        <div class="p-4 bg-gray-50 dark:bg-gray-700">
            <!-- BARIS 1 -->
            <div class="grid grid-cols-4 gap-3 mb-3">
                <button class="tombol bg-tombolMerah text-white font-semibold" onclick="hapusSemua()">AC</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahSimbol('(')">(</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahSimbol(')')">)</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahSimbol('/')">÷</button>
            </div>

            <!-- BARIS 2 -->
            <div class="grid grid-cols-4 gap-3 mb-3">
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('7')">7</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('8')">8</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('9')">9</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahSimbol('*')">×</button>
            </div>

            <!-- BARIS 3 -->
            <div class="grid grid-cols-4 gap-3 mb-3">
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('4')">4</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('5')">5</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('6')">6</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahSimbol('-')">−</button>
            </div>

            <!-- BARIS 4 -->
            <div class="grid grid-cols-4 gap-3 mb-3">
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('1')">1</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('2')">2</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('3')">3</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahSimbol('+')">+</button>
            </div>

            <!-- BARIS 5 -->
            <div class="grid grid-cols-4 gap-3">
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="ubahTanda()">+/-</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('0')">0</button>
                <button class="tombol bg-tombolNetral dark:bg-gray-600 dark:text-white" onclick="tambahAngka('.')">.</button>
                <button class="tombol gradasi-warna text-white font-semibold" onclick="hitung()">=</button>
            </div>

            <!-- KETERANGAN VALIDASI -->
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-4 text-center">Validasi: hanya angka dan tidak boleh kosong.</p>
        </div>
    </div>

    <script>
        // Ambil elemen halaman
        const layarUtama = document.getElementById('layarUtama');
        const layarAtas = document.getElementById('layarAtas');
        const tombolTema = document.getElementById('tombolTema');
        let ekspresi = ''; // Menyimpan semua angka dan operasi yang dimasukkan

        // Fungsi ganti tema terang/gelap
        tombolTema.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            if (document.body.classList.contains('dark')) {
                tombolTema.innerHTML = '<i class="fa fa-sun-o"></i>';
            } else {
                tombolTema.innerHTML = '<i class="fa fa-moon-o"></i>';
            }
        });

        // Fungsi memasukkan angka
        function tambahAngka(angka) {
            // Cegah memasukkan titik desimal lebih dari satu kali dalam satu angka
            if (angka === '.' && /\.[^+\-*/()]*$/.test(ekspresi)) return;
            
            // Jika awalnya 0 dan bukan titik, ganti dengan angka yang dimasukkan
            if (ekspresi === '0' && angka !== '.') {
                ekspresi = angka;
            } else {
                ekspresi += angka;
            }
            
            perbaruiLayar();
        }

        // Fungsi memasukkan simbol operasi atau tanda kurung
        function tambahSimbol(simbol) {
            // Validasi agar tidak ada operasi yang tidak valid
            const karakterTerakhir = ekspresi.slice(-1);
            
            // Cegah menambahkan operasi setelah operasi lain atau di awal
            if ((['+', '-', '*', '/'].includes(simbol) && (ekspresi === '' || ['+', '-', '*', '/'].includes(karakterTerakhir))) && simbol !== '-') {
                return;
            }
            
            // Cegah menutup kurung jika belum ada kurung buka
            if (simbol === ')' && (ekspresi === '' || !ekspresi.includes('(') || !/[(][^)]*$/.test(ekspresi))) {
                return;
            }

            ekspresi += simbol;
            perbaruiLayar();
        }

        // Fungsi mengubah tanda positif/negatif
        function ubahTanda() {
            if (ekspresi === '') return;
            
            // Cari posisi awal angka terakhir
            let posisi = ekspresi.length - 1;
            while (posisi >= 0 && !['+', '-', '*', '/', '('].includes(ekspresi[posisi])) {
                posisi--;
            }
            
            const bagianDepan = ekspresi.substring(0, posisi + 1);
            const bagianAngka = ekspresi.substring(posisi + 1);
            
            if (bagianAngka.startsWith('-')) {
                ekspresi = bagianDepan + bagianAngka.slice(1);
            } else {
                ekspresi = bagianDepan + '-' + bagianAngka;
            }
            
            perbaruiLayar();
        }

        // Fungsi utama untuk menghitung hasil
        function hitung() {
            // Validasi input: tidak boleh kosong dan harus diakhiri dengan angka atau kurung tutup
            if (ekspresi === '') {
                layarAtas.textContent = '⚠️ Tidak boleh kosong';
                return;
            }
            
            if (!/[\d)]$/.test(ekspresi)) {
                layarAtas.textContent = '⚠️ Masukkan angka atau operasi yang valid';
                return;
            }

            try {
                // Ubah simbol kali dan bagi agar bisa diproses JavaScript
                let ekspresiHitung = ekspresi.replace(/×/g, '*').replace(/÷/g, '/');
                
                // Lakukan perhitungan
                const hasil = eval(ekspresiHitung);
                
                // Tampilkan hasil
                layarAtas.textContent = `${ekspresi} =`;
                ekspresi = hasil.toString();
                perbaruiLayar();
            } catch (error) {
                layarAtas.textContent = '❌ Ekspresi tidak valid';
            }
        }

        // Fungsi menghapus semua input
        function hapusSemua() {
            ekspresi = '';
            layarUtama.value = '0';
            layarAtas.textContent = '';
        }

        // Fungsi memperbarui tampilan layar
        function perbaruiLayar() {
            layarUtama.value = ekspresi || '0';
            // Bersihkan pesan peringatan jika input sudah benar
            if (layarAtas.textContent.includes('⚠️') || layarAtas.textContent.includes('❌')) {
                layarAtas.textContent = '';
            }
        }
    </script>
</body>
</html>
